<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX1280 QO100 SSB TX - Demo Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .video-container {
            padding: 40px 30px;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
        }
        
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .back-link {
            display: block;
            text-align: center;
            padding: 20px 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-top: 1px solid #eee;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Demo Video</h1>
            <p>SX1280 QO100 SSB TX Variant</p>
        </div>
        
        <div class="video-container">
            <div class="video-wrapper">
                <video controls>
                    <source src="demo.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div class="info">
                <h2>📹 Informacje</h2>
                <p>Demo video projektu SX1280 QO100 SSB TX Variant</p>
            </div>
        </div>
        
        <a href="https://github.com/AdamSwiercz/SX1280_QO100_SSB_TX_variant" class="back-link">
            ← Wróć do repozytorium
        </a>
    </div>
</body>
</html>
